<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heights</title>
    
    <!-- Виправлено: додано правильний шлях до іконки вкладки -->
    <link rel="icon" type="image/png" href="./site/HeightLogo.png">
    
    <style>
        /* Центрування всієї сторінки */
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #ffffff;
        }

        /* Контейнер для картинки та прямокутника */
        .image-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px; /* Відступ між картинкою та прямокутником */
        }

        /* Виправлено: примусове відображення картинки */
        .site-logo {
            width: 150px; /* Фіксована ширина зображення */
            height: 150px; /* Фіксована висота (підлаштуйте під пропорції логотипа) */
            object-fit: contain; /* Картинка не буде деформуватися */
            display: block;
        }

        /* Помаранчевий прямокутник */
        .orange-rectangle {
            width: 200px;       
            height: 50px;       
            background-color: #ff9800; 
            border-radius: 4px; 
        }
    </style>
</head>
<body>
    <script>
        console.clear();
        console.log("STOP!");
        console.warn("Don't do anything in this console!");
        document.cookie = "sesion=[Ok]; max-age=60; path=/;";
    </script>

    <div class="image-container">
        <!-- Картинка з чітким класом -->
        <img src="./site/HeightLogo.png" alt="Height Logo" class="site-logo">
        
        <!-- Прямокутник -->
        <div class="orange-rectangle"></div>
    </div>
</body>
</html>
