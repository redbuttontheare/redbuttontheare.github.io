<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heights</title>
    <!-- Виправлено шлях до іконки вкладки, оскільки вона лежить у папці site -->
    <link rel="icon" type="image/png" href="./site/HeightLogo.png">
    <style>
        /* Стилі для контейнера, щоб вирівняти елементи по центру */
        .image-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px; /* Відступ між картинкою та прямокутником */
            margin: 20px auto;
        }

        /* ТУТ БУЛА ПОМИЛКА (коментар закрито правильно: */) */
        .site-logo {
            max-width: 150px; /* Максимальна ширина картинки */
            height: auto;
        }

        /* Стилі для створення прямокутника */
        .orange-rectangle {
            width: 200px;       /* Ширина прямокутника */
            height: 50px;       /* Висота прямокутника */
            background-color: #ff9800; /* Помаранчевий колір */
            border-radius: 4px; /* Легке закруглення кутів */
        }
    </style>
</head>
<body>
    <script>
        console.clear()
        console.log("STOP!")
        console.warn("Don't do anything in this console!")

        document.cookie = "sesion=[Ok]; max-age=60; path=/;"
    </script>

    <!-- Контейнер, який об'єднує картинку та помаранчевий прямокутник -->
    <div class="image-container">
        <!-- Ваше зображення з правильним шляхом до папки site -->
        <img src="./site/HeightLogo.png" alt="Height Logo" class="site-logo">
        
        <!-- Помаранчевий прямокутник під зображенням -->
        <div class="orange-rectangle"></div>
    </div>

</body>
