<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heights Developers</title>
    <link rel="icon" type="image/png" href="./HeightLogo.png">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:"Segoe UI",sans-serif;
        }

        body{
            min-height:100vh;
            background:linear-gradient(135deg,#0f172a,#1e293b);
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .container{
            width:100%;
            max-width:800px;
            background:rgba(255,255,255,0.05);
            backdrop-filter:blur(12px);
            border:1px solid rgba(255,255,255,0.1);
            border-radius:20px;
            padding:40px;
            box-shadow:0 0 30px rgba(0,0,0,0.3);
        }

        .site-logo{
            width:140px;
            display:block;
            margin:auto;
            animation:float 3s ease-in-out infinite;
        }

        h1{
            text-align:center;
            margin-top:15px;
            margin-bottom:30px;
            font-size:3rem;
        }

        .home-btn{
            display:inline-block;
            text-decoration:none;
            color:white;
            background:linear-gradient(135deg,#475569,#334155);
            padding:12px 20px;
            border-radius:12px;
            margin-bottom:25px;
            transition:.3s;
        }

        .home-btn:hover{
            transform:translateY(-2px);
        }

        .developer-card{
            background:rgba(255,255,255,0.04);
            border:1px solid rgba(255,255,255,0.08);
            border-radius:16px;
            padding:25px;
            text-align:center;
        }

        .developer-card h2{
            margin-bottom:10px;
        }

        .developer-card p{
            color:#cbd5e1;
            margin-bottom:20px;
        }

        .download-btn{
            border:none;
            cursor:pointer;
            color:white;
            font-weight:bold;
            padding:14px 22px;
            border-radius:12px;
            background:linear-gradient(135deg,#2563eb,#1d4ed8);
            transition:.3s;
        }

        .download-btn:hover{
            transform:scale(1.05);
            box-shadow:0 0 20px rgba(37,99,235,.5);
        }

        .footer{
            margin-top:30px;
            text-align:center;
            color:#94a3b8;
        }

        @keyframes float{
            0%,100%{
                transform:translateY(0);
            }
            50%{
                transform:translateY(-10px);
            }
        }
    </style>
</head>
<body>

<script>
    console.clear();
    console.log("%cSTOP!", "color:red;font-size:40px;font-weight:bold;");
    console.warn("Don't do anything in this console!");

    document.cookie = "session=Ok; max-age=60; path=/;";

    function downloadFile(filePath, fileName) {
        const fileUrl = './' + filePath;

        fetch(fileUrl)
            .then(response => response.blob())
            .then(blob => {
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = fileName;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            })
            .catch(() => alert('Error!'));
    }
</script>

<div class="container">

    <img src="./HeightLogo.png" alt="Height Logo" class="site-logo">

    <h1>Heights Developers</h1>

    <a href="https://redbuttontheare.github.io" class="home-btn">
        ← Return to Main Page
    </a>

    <div class="developer-card">
        <h2>👨‍💻 Development Team</h2>
        <p>
            Download the official developers list of Heights Studios.
        </p>

        <button class="download-btn"
            onclick="downloadFile('HeightsDevs.xlsx','HeightsDevs.xlsx')">
            📊 Download Excel Table
        </button>
    </div>

    <div class="footer">
        © 2026 Heights Studios
    </div>

</div>

</body>
</html>
